<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Widget Habilitation</title>
    <script src="https://grist.numerique.gouv.fr/grist-plugin-api.js"></script>
    <style>
        :root {
            --primary: #0055CC;
            --primary-hover: #0047AB;
            --dark: #000091;
            --light: #F5F5F5;
            --border: #E5E5E5;
            --text: #3C3C3C;
            --text-muted: #656565;
            --success: #4CAF50;
            --success-hover: #45a049;
            --error: #D32F2F;
            --warning: #FCB02D;
            --info-bg: #E3F2FD;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--light); 
            color: var(--text); 
            padding: 20px; 
        }
        
        .container { max-width: 1200px; margin: 0 auto; }
        
        h1 { 
            color: var(--dark); 
            margin-bottom: 30px; 
            font-size: 32px; 
        }
        
        h2 { 
            color: var(--dark); 
            font-size: 18px; 
            margin-bottom: 15px; 
            border-bottom: 2px solid var(--light); 
            padding-bottom: 8px; 
        }

        /* LAYOUT */
        .main-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 20px; 
        }
        
        .panel { 
            background: white; 
            padding: 20px; 
            border-radius: 8px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.1); 
        }
        
        .column { 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
        }

        /* FORMS */
        .form-group { margin-bottom: 15px; }
        
        label { 
            display: block; 
            font-weight: 600; 
            margin-bottom: 6px; 
            color: var(--dark); 
            font-size: 13px; 
        }
        
        select, 
        input[type="text"], 
        textarea { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid var(--border); 
            border-radius: 4px; 
            font-family: inherit; 
            font-size: 13px; 
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        
        select:focus, 
        input[type="text"]:focus, 
        textarea:focus { 
            outline: none; 
            border-color: var(--primary); 
            box-shadow: 0 0 0 3px rgba(0, 85, 204, 0.1); 
        }

        /* BUTTONS */
        .button { 
            display: inline-block; 
            padding: 10px 20px; 
            border: none; 
            border-radius: 4px; 
            font-weight: 600; 
            cursor: pointer; 
            font-size: 13px;
            transition: background-color 0.2s;
        }
        
        .btn-primary { 
            background-color: var(--primary); 
            color: white; 
        }
        .btn-primary:hover { background-color: var(--primary-hover); }
        
        .btn-secondary { 
            background-color: var(--light); 
            color: var(--text); 
            border: 1px solid var(--border); 
        }
        .btn-secondary:hover { background-color: var(--border); }
        
        .btn-success { 
            background-color: var(--success); 
            color: white; 
        }
        .btn-success:hover { background-color: var(--success-hover); }
        
        .btn-small { 
            padding: 6px 12px; 
            font-size: 11px; 
        }
        
        .button-group { 
            display: flex; 
            gap: 8px; 
            flex-wrap: wrap; 
            margin-top: 12px; 
        }

        /* EDITOR */
        .editor-area { 
            display: flex; 
            flex-direction: column; 
            height: 350px; 
        }
        
        .editor-textarea { 
            flex: 1; 
            resize: none; 
            font-family: inherit; 
            font-size: 13px; 
            padding: 10px; 
        }

        /* CONTACTS */
        .contacts-list { 
            max-height: 400px; 
            overflow-y: auto; 
        }
        
        .contact-card { 
            background: var(--light); 
            padding: 10px; 
            margin-bottom: 8px; 
            border-radius: 4px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-left: 3px solid var(--primary); 
            font-size: 12px;
            transition: background-color 0.2s;
        }
        
        .contact-card.selected { 
            background: var(--info-bg); 
        }
        
        .contact-info h3 { 
            font-size: 13px; 
            margin-bottom: 2px; 
            color: var(--dark); 
        }
        
        .contact-info p { 
            font-size: 11px; 
            color: var(--text-muted); 
            margin: 1px 0; 
        }
        
        .contact-actions { 
            display: flex; 
            gap: 6px; 
            align-items: center; 
        }
        
        input[type="checkbox"] { 
            width: 16px; 
            height: 16px; 
            cursor: pointer; 
        }

        /* MESSAGES */
        .alert { 
            padding: 10px; 
            margin-bottom: 12px; 
            border-radius: 4px; 
            border-left: 4px solid transparent;
            font-size: 12px; 
        }
        
        .alert-info { 
            background-color: var(--info-bg); 
            border-left-color: var(--primary); 
        }
        
        .alert-error { 
            background-color: #FFEBEE; 
            border-left-color: var(--error); 
            color: #C62828; 
        }
        
        .alert-warning { 
            background-color: #FFF3E0; 
            border-left-color: var(--warning); 
            color: #E65100; 
        }

        /* STATES */
        .hidden { display: none !important; }
        
        .loading { 
            text-align: center; 
            padding: 20px; 
            color: var(--text-muted); 
            font-size: 13px; 
        }

        /* BULK ACTIONS */
        .bulk-actions { 
            background: var(--light); 
            padding: 10px; 
            border-radius: 4px; 
            border-left: 3px solid var(--warning); 
            margin-bottom: 12px; 
        }

        /* RESPONSIVE */
        @media (max-width: 1024px) { 
            .main-grid { grid-template-columns: 1fr; } 
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Habilitation des Agents</h1>

        <div class="main-grid">
            <!-- LEFT COLUMN -->
            <div class="column">
                <!-- CONFIG PANEL -->
                <div class="panel">
                    <h2>📋 Configuration</h2>
                    <div id="loadingState" class="loading">⏳ Chargement...</div>
                    <div id="errorState" class="alert alert-error hidden"></div>

                    <div id="configState" class="hidden">
                        <div class="form-group">
                            <label for="projectSelect">Projet :</label>
                            <select id="projectSelect">
                                <option value="">-- Choisir --</option>
                            </select>
                        </div>

                        <div id="messageState" class="hidden">
                            <div class="form-group">
                                <label for="templateSelect">Template :</label>
                                <select id="templateSelect">
                                    <option value="">-- Nouveau --</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="subjectInput">Objet du mail :</label>
                                <input type="text" id="subjectInput" />
                            </div>

                            <div class="button-group">
                                <button id="saveBtn" class="button btn-primary btn-small hidden">
                                    💾 Enregistrer
                                </button>
                                <button id="saveAsBtn" class="button btn-primary btn-small">
                                    💾 Enregistrer sous...
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- EDITOR PANEL -->
                <div class="panel">
                    <h2>✍️ Éditer Template</h2>
                    <div id="editorState" class="hidden">
                        <div class="editor-area">
                            <textarea id="contentInput" class="editor-textarea" 
                                      placeholder="Contenu du template..."></textarea>
                        </div>
                    </div>
                </div>
            </div>

            <!-- RIGHT COLUMN -->
            <div class="column">
                <!-- ACTIONS PANEL -->
                <div class="panel">
                    <h2>📧 Actions Mail</h2>
                    <div id="bulkActionsState" class="bulk-actions hidden">
                        <button class="button btn-success btn-small" id="sendGroupBtn">
                            📧 Groupé
                        </button>
                        <button class="button btn-secondary btn-small" id="previewBtn">
                            👁️ Aperçu
                        </button>
                        <div style="font-size: 11px; margin-top: 8px; color: var(--text-muted);">
                            Sélectionnés : <span id="selectedCount">0</span>
                        </div>
                    </div>
                    <div id="noSelectionAlert" class="alert alert-info">
                        Sélectionnez des agents
                    </div>
                </div>

                <!-- CONTACTS PANEL -->
                <div class="panel">
                    <h2>👥 Agents</h2>
                    <div id="noProjectAlert" class="alert alert-info">
                        Sélectionnez un projet
                    </div>

                    <div id="contactsState" class="hidden">
                        <div class="alert alert-info">
                            Total : <span id="contactCount">0</span>
                        </div>
                        <div class="contacts-list" id="contactsList"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // CONSTANTS
        // ============================================
        const TABLES = {
            PROJECTS: 'Projets',
            CONTACTS: 'Contacts',
            TEMPLATES: 'Templates'
        };

        const COLUMNS = {
            HABILITATION: 'Habilitation_accordee',
            ENABLED: 'Habilite'
        };

        // ============================================
        // STATE MANAGEMENT
        // ============================================
        const state = {
            gristReady: false,
            projects: [],
            contacts: [],
            templates: [],
            currentProject: null,
            currentTemplate: null,
            selectedContacts: new Set()
        };

        // ============================================
        // UTILITY FUNCTIONS
        // ============================================
        function columnsToRows(columnData) {
            const keys = Object.keys(columnData);
            const rowCount = columnData.id?.length ?? 0;
            const rows = [];

            for (let i = 0; i < rowCount; i++) {
                const row = {};
                keys.forEach(key => {
                    let value = columnData[key][i];
                    // Unwrap single-element arrays
                    if (Array.isArray(value) && value.length === 1) {
                        value = value[0];
                    }
                    row[key] = value;
                });
                rows.push(row);
            }
            return rows;
        }

        function showElement(selector) {
            document.getElementById(selector).classList.remove('hidden');
        }

        function hideElement(selector) {
            document.getElementById(selector).classList.add('hidden');
        }

        function showError(message) {
            const errorEl = document.getElementById('errorState');
            errorEl.textContent = '❌ ' + message;
            showElement('errorState');
        }

        function showSuccess(message) {
            alert('✅ ' + message);
        }

        function showWarning(message) {
            alert('⚠️ ' + message);
        }

        // ============================================
        // GRIST INITIALIZATION
        // ============================================
        async function initGrist() {
            try {
                if (!window.grist) {
                    throw new Error("API Grist non disponible");
                }

                await grist.ready({ requiredAccess: 'full' });
                state.gristReady = true;

                // Fetch all data
                const [projects, contacts, templates] = await Promise.all([
                    grist.docApi.fetchTable(TABLES.PROJECTS),
                    grist.docApi.fetchTable(TABLES.CONTACTS),
                    grist.docApi.fetchTable(TABLES.TEMPLATES)
                ]);

                state.projects = columnsToRows(projects);
                state.contacts = columnsToRows(contacts);
                state.templates = columnsToRows(templates);

                // Update UI
                hideElement('loadingState');
                showElement('configState');
                populateProjects();
                attachEventListeners();

            } catch (error) {
                hideElement('loadingState');
                showError(error.message);
            }
        }

        // ============================================
        // UI POPULATION
        // ============================================
        function populateProjects() {
            const select = document.getElementById('projectSelect');
            select.innerHTML = '<option value="">-- Choisir --</option>';
            
            state.projects.forEach(project => {
                const option = document.createElement('option');
                option.value = project.id;
                option.textContent = project.Projet;
                select.appendChild(option);
            });
        }

        function populateTemplates(projectId) {
            const select = document.getElementById('templateSelect');
            const templates = state.templates.filter(t => t.Projet === projectId);
            
            select.innerHTML = '<option value="">-- Nouveau --</option>';
            templates.forEach(template => {
                const option = document.createElement('option');
                option.value = template.id;
                option.textContent = template.Nom || `Template ${template.id}`;
                select.appendChild(option);
            });
        }

        function displayContacts(projectId) {
            const contacts = state.contacts.filter(c => c.Projet === projectId);
            const list = document.getElementById('contactsList');
            list.innerHTML = '';

            if (contacts.length === 0) {
                hideElement('contactsState');
                return;
            }

            document.getElementById('contactCount').textContent = contacts.length;
            showElement('contactsState');

            contacts.forEach(contact => {
                const card = createContactCard(contact);
                list.appendChild(card);
            });
        }

        function createContactCard(contact) {
            const card = document.createElement('div');
            const isSelected = state.selectedContacts.has(contact.id);
            
            card.className = 'contact-card' + (isSelected ? ' selected' : '');
            card.id = `contact-${contact.id}`;
            
            const habilitation = contact[COLUMNS.HABILITATION] || '';
            const isEnabled = contact[COLUMNS.ENABLED] === true;

            card.innerHTML = `
                <div style="flex: 1; display: flex; gap: 8px; align-items: center;">
                    <input type="checkbox" 
                           data-contact-id="${contact.id}"
                           class="contact-select"
                           ${isSelected ? 'checked' : ''}>
                    <div class="contact-info">
                        <h3>${contact.Prénom || ''} ${contact.Nom || ''}</h3>
                        <p>📧 ${contact.Mail || 'N/A'}</p>
                        <p>${habilitation}</p>
                    </div>
                </div>
                <div class="contact-actions">
                    <input type="checkbox" 
                           data-contact-id="${contact.id}"
                           class="contact-enable"
                           ${isEnabled ? 'checked' : ''}
                           title="Habilité">
                    <button class="button btn-small btn-primary" data-contact-id="${contact.id}" class="send-one">
                        📧
                    </button>
                </div>
            `;

            return card;
        }

        // ============================================
        // EVENT HANDLERS
        // ============================================
        function attachEventListeners() {
            // Project selection
            document.getElementById('projectSelect').addEventListener('change', handleProjectChange);
            
            // Template selection
            document.getElementById('templateSelect').addEventListener('change', handleTemplateChange);
            
            // Template actions
            document.getElementById('saveBtn').addEventListener('click', saveTemplate);
            document.getElementById('saveAsBtn').addEventListener('click', saveTemplateAs);
            
            // Email actions
            document.getElementById('sendGroupBtn').addEventListener('click', sendGroupEmail);
            document.getElementById('previewBtn').addEventListener('click', previewEmail);
            
            // Contact list delegation (for dynamic elements)
            document.getElementById('contactsList').addEventListener('change', handleContactChange);
            document.getElementById('contactsList').addEventListener('click', handleContactClick);
        }

        function handleProjectChange(event) {
            const projectId = parseInt(event.target.value) || null;
            
            if (!projectId) {
                state.currentProject = null;
                state.currentTemplate = null;
                state.selectedContacts.clear();
                hideElement('messageState');
                hideElement('editorState');
                hideElement('contactsState');
                return;
            }

            state.currentProject = state.projects.find(p => p.id === projectId);
            state.currentTemplate = null;
            state.selectedContacts.clear();

            document.getElementById('contentInput').value = '';
            document.getElementById('subjectInput').value = '';
            hideElement('saveBtn');
            showElement('messageState');
            showElement('editorState');

            populateTemplates(projectId);
            displayContacts(projectId);
        }

        function handleTemplateChange(event) {
            const templateId = parseInt(event.target.value) || null;

            if (!templateId) {
                state.currentTemplate = null;
                document.getElementById('contentInput').value = '';
                hideElement('saveBtn');
                return;
            }

            const template = state.templates.find(t => t.id === templateId);
            if (template) {
                state.currentTemplate = template;
                document.getElementById('contentInput').value = template.Contenu_HTML || '';
                document.getElementById('subjectInput').value = template.Objet_Mail || '';
                showElement('saveBtn');
            }
        }

        function handleContactChange(event) {
            const contactId = parseInt(event.target.dataset.contactId);

            if (event.target.classList.contains('contact-select')) {
                toggleContactSelection(contactId);
            } else if (event.target.classList.contains('contact-enable')) {
                toggleContactEnabled(contactId);
            }
        }

        function handleContactClick(event) {
            if (event.target.classList.contains('send-one')) {
                const contactId = parseInt(event.target.dataset.contactId);
                sendOneEmail(contactId);
            }
        }

        function toggleContactSelection(contactId) {
            if (state.selectedContacts.has(contactId)) {
                state.selectedContacts.delete(contactId);
                document.getElementById(`contact-${contactId}`).classList.remove('selected');
            } else {
                state.selectedContacts.add(contactId);
                document.getElementById(`contact-${contactId}`).classList.add('selected');
            }

            updateSelectionUI();
        }

        function updateSelectionUI() {
            const count = state.selectedContacts.size;
            document.getElementById('selectedCount').textContent = count;

            if (count > 0) {
                showElement('bulkActionsState');
                hideElement('noSelectionAlert');
            } else {
                hideElement('bulkActionsState');
                showElement('noSelectionAlert');
            }
        }

        async function toggleContactEnabled(contactId) {
            const contact = state.contacts.find(c => c.id === contactId);
            if (!contact) return;

            const newValue = !contact[COLUMNS.ENABLED];
            contact[COLUMNS.ENABLED] = newValue;

            try {
                await grist.docApi.applyUserActions([[
                    'UpdateRecord',
                    TABLES.CONTACTS,
                    contactId,
                    { [COLUMNS.ENABLED]: newValue }
                ]]);
            } catch (error) {
                console.error('Error updating contact:', error);
                showWarning('Erreur lors de la mise à jour');
            }
        }

        // ============================================
        // EMAIL FUNCTIONS
        // ============================================
        function sendOneEmail(contactId) {
            const contact = state.contacts.find(c => c.id === contactId);
            if (contact?.Mail) {
                openMailClient(contact.Mail);
            }
        }

        function sendGroupEmail() {
            const emails = [];
            state.selectedContacts.forEach(contactId => {
                const contact = state.contacts.find(c => c.id === contactId);
                if (contact?.Mail) {
                    emails.push(contact.Mail);
                }
            });

            if (emails.length === 0) {
                showWarning('Aucun email disponible');
                return;
            }

            openMailClient(emails.join(';'));
        }

        function openMailClient(recipients) {
            const subject = document.getElementById('subjectInput').value;
            const mailLink = `mailto:${recipients}?subject=${encodeURIComponent(subject)}`;
            window.open(mailLink);
        }

        function previewEmail() {
            const subject = document.getElementById('subjectInput').value || '(Sans objet)';
            showWarning(`Aperçu\n\nObjet : ${subject}\nDestinataires : ${state.selectedContacts.size} agents`);
        }

        // ============================================
        // TEMPLATE MANAGEMENT
        // ============================================
        async function saveTemplate() {
            if (!state.currentTemplate) {
                showWarning('Aucun template sélectionné');
                return;
            }

            const content = document.getElementById('contentInput').value.trim();
            const subject = document.getElementById('subjectInput').value.trim();

            if (!content) {
                showWarning('Contenu vide');
                return;
            }

            try {
                await grist.docApi.applyUserActions([[
                    'UpdateRecord',
                    TABLES.TEMPLATES,
                    state.currentTemplate.id,
                    {
                        Contenu_HTML: content,
                        Objet_Mail: subject
                    }
                ]]);

                // Update local state
                state.currentTemplate.Contenu_HTML = content;
                state.currentTemplate.Objet_Mail = subject;

                showSuccess('Template mis à jour !');
            } catch (error) {
                console.error('Error saving template:', error);
                showWarning(`Erreur : ${error.message}`);
            }
        }

        async function saveTemplateAs() {
            if (!state.currentProject) {
                showWarning('Sélectionnez un projet');
                return;
            }

            const content = document.getElementById('contentInput').value.trim();
            const subject = document.getElementById('subjectInput').value.trim();

            if (!content) {
                showWarning('Contenu vide');
                return;
            }

            if (!subject) {
                showWarning('Nom du template vide');
                return;
            }

            try {
                await grist.docApi.applyUserActions([[
                    'AddRecord',
                    TABLES.TEMPLATES,
                    null,
                    {
                        Projet: state.currentProject.id,
                        Nom: subject,
                        Contenu_HTML: content,
                        Objet_Mail: subject
                    }
                ]]);

                // Refresh templates
                const templates = columnsToRows(
                    await grist.docApi.fetchTable(TABLES.TEMPLATES)
                );
                state.templates = templates;
                populateTemplates(state.currentProject.id);

                showSuccess('Template créé !');
                document.getElementById('templateSelect').value = '';
                state.currentTemplate = null;
            } catch (error) {
                console.error('Error creating template:', error);
                showWarning(`Erreur : ${error.message}`);
            }
        }

        // ============================================
        // INITIALIZATION
        // ============================================
        document.addEventListener('DOMContentLoaded', initGrist);
    </script>
</body>
</html>
