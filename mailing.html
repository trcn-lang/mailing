<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Widget Habilitation</title>
    <script src="https://grist.numerique.gouv.fr/grist-plugin-api.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #F5F5F5; color: #3C3C3C; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #000091; margin-bottom: 30px; font-size: 32px; }
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .panel { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .panel h2 { color: #000091; font-size: 20px; margin-bottom: 20px; border-bottom: 2px solid #F5F5F5; padding-bottom: 10px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #000091; font-size: 14px; }
        select, input[type="text"], textarea { width: 100%; padding: 12px; border: 1px solid #E5E5E5; border-radius: 4px; font-family: inherit; font-size: 14px; }
        select:focus, input[type="text"]:focus, textarea:focus { outline: none; border-color: #0055CC; box-shadow: 0 0 0 3px rgba(0, 85, 204, 0.1); }
        textarea { resize: vertical; min-height: 150px; font-family: monospace; font-size: 12px; }
        .editor-toolbar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #E5E5E5; }
        .editor-btn { padding: 8px 12px; border: 1px solid #E5E5E5; background: white; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 500; }
        .editor-btn:hover { background: #F5F5F5; border-color: #0055CC; color: #0055CC; }
        .button { display: inline-block; padding: 12px 24px; border: none; border-radius: 4px; font-weight: 600; cursor: pointer; font-size: 14px; }
        .btn-primary { background-color: #0055CC; color: white; }
        .btn-primary:hover { background-color: #0047AB; }
        .btn-secondary { background-color: #F5F5F5; color: #3C3C3C; border: 1px solid #E5E5E5; }
        .btn-secondary:hover { background-color: #E5E5E5; }
        .btn-success { background-color: #4CAF50; color: white; }
        .btn-success:hover { background-color: #45a049; }
        .btn-small { padding: 8px 12px; font-size: 12px; }
        .button-group { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px; }
        .contacts-list { margin-top: 20px; }
        .contact-card { background: #F5F5F5; padding: 15px; margin-bottom: 12px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #0055CC; }
        .contact-card.selected { background: #E3F2FD; }
        .contact-info h3 { font-size: 16px; margin-bottom: 4px; color: #000091; }
        .contact-info p { font-size: 13px; color: #656565; margin: 2px 0; }
        .contact-actions { display: flex; gap: 10px; align-items: center; }
        .checkbox-container { display: flex; align-items: center; gap: 8px; }
        .checkbox-container input { width: 20px; height: 20px; cursor: pointer; }
        .preview-section { background: white; border: 1px solid #E5E5E5; border-radius: 4px; padding: 15px; margin-top: 20px; max-height: 300px; overflow-y: auto; }
        .preview-section h3 { color: #000091; font-size: 14px; margin-bottom: 10px; }
        .preview-frame { border: 1px solid #E5E5E5; border-radius: 4px; padding: 15px; background: white; font-size: 12px; }
        .info-box { background-color: #E3F2FD; border-left: 4px solid #0055CC; padding: 15px; margin-bottom: 20px; border-radius: 4px; font-size: 13px; }
        .error-box { background-color: #FFEBEE; border-left: 4px solid #D32F2F; padding: 15px; margin-bottom: 20px; border-radius: 4px; font-size: 13px; color: #C62828; }
        .success-box { background-color: #E8F5E9; border-left: 4px solid #4CAF50; padding: 15px; margin-bottom: 20px; border-radius: 4px; font-size: 13px; color: #2E7D32; }
        .loading { text-align: center; padding: 40px 20px; color: #656565; }
        .bulk-actions { background: #F5F5F5; padding: 15px; border-radius: 4px; margin-top: 20px; border-left: 4px solid #FCB02D; }
        @media (max-width: 768px) { .main-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Habilitation des Agents</h1>

        <div class="main-grid">
            <!-- COLONNE GAUCHE -->
            <div class="panel">
                <h2>📋 Configuration du Projet</h2>
                <div id="loadingMessage" class="loading">⏳ Chargement...</div>
                <div id="errorMessage" style="display: none;"></div>

                <div id="configSection" style="display: none;">
                    <div class="form-group">
                        <label for="projectSelect">Sélectionner un projet :</label>
                        <select id="projectSelect"></select>
                    </div>

                    <div id="messageSection" style="display: none;">
                        <div class="form-group">
                            <label for="templateSelect">Sélectionner un template :</label>
                            <select id="templateSelect"></select>
                        </div>

                        <div class="form-group">
                            <label for="subjectText">Objet du mail :</label>
                            <input type="text" id="subjectText" />
                        </div>

                        <div class="form-group">
                            <label>Message HTML :</label>
                            <div class="editor-toolbar">
                                <button class="editor-btn" onclick="insertTag('b', 'Gras')"><strong>G</strong></button>
                                <button class="editor-btn" onclick="insertTag('i', 'Italique')"><em>I</em></button>
                                <button class="editor-btn" onclick="insertHeading()">H1</button>
                                <button class="editor-btn" onclick="insertLink()">🔗 Lien</button>
                                <button class="editor-btn" onclick="insertList()">☰ Liste</button>
                                <div style="flex-grow: 1;"></div>
                                <button class="editor-btn" onclick="copyToClipboard()" style="background: #4CAF50; color: white;">📋 Copier</button>
                            </div>
                            <textarea id="messageText"></textarea>
                        </div>

                        <div id="copyFeedback" style="display: none; margin-top: 10px;" class="success-box">
                            ✅ HTML copié !
                        </div>

                        <div class="button-group">
                            <button id="btnSave" class="button btn-primary" onclick="saveMessage()" style="display: none;">💾 Enregistrer</button>
                            <button class="button btn-primary" onclick="saveMessageAs()">💾 Enregistrer sous...</button>
                        </div>

                        <div class="preview-section">
                            <h3>Aperçu :</h3>
                            <div class="preview-frame" id="messagePreview"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- COLONNE DROITE -->
            <div class="panel">
                <h2>👥 Agents à habiliter</h2>
                <div id="noProjectSelected" class="info-box">Sélectionnez un projet</div>

                <div id="contactsSection" style="display: none;">
                    <div class="info-box">
                        Agents : <span id="contactCount">0</span> | Sélectionnés : <span id="selectedCount">0</span>
                    </div>
                    <div class="contacts-list" id="contactsList"></div>

                    <div id="bulkActionsSection" class="bulk-actions" style="display: none;">
                        <button class="button btn-success btn-small" onclick="sendGroupEmail()">📧 Envoyer email groupé</button>
                        <button class="button btn-secondary btn-small" onclick="previewAndSend()">👁️ Aperçu</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // CONFIG
        const TABLE_PROJETS = 'Projets';
        const TABLE_CONTACTS = 'Contacts';
        const TABLE_TEMPLATES = 'Templates';
        const COL_HABILITATION = 'Habilitation_accordee';
        const COL_HABILITE = 'Habilite';

        let state = {
            projects: [], contacts: [], templates: [],
            currentProject: null, currentTemplateId: null,
            selectedContacts: new Set(),
            gristReady: false
        };

        function columnsToRows(colData) {
            const keys = Object.keys(colData);
            const rowCount = colData.id ? colData.id.length : (colData[keys[0]] || []).length;
            const rows = [];
            for (let i = 0; i < rowCount; i++) {
                const row = {};
                keys.forEach(key => {
                    let value = colData[key][i];
                    if (Array.isArray(value) && value.length > 0) value = value[0];
                    row[key] = value;
                });
                rows.push(row);
            }
            return rows;
        }

        function loadGristScript(url) {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = url;
                script.onload = () => resolve();
                script.onerror = () => reject(new Error("Impossible de charger l'API Grist"));
                document.head.appendChild(script);
            });
        }

        async function initGrist() {
            try {
                await loadGristScript('https://grist.numerique.gouv.fr/grist-plugin-api.js');
                if (!window.grist) throw new Error("API Grist non disponible");

                await grist.ready({ requiredAccess: 'full' });
                state.gristReady = true;

                const projects = columnsToRows(await grist.docApi.fetchTable(TABLE_PROJETS));
                const contacts = columnsToRows(await grist.docApi.fetchTable(TABLE_CONTACTS));
                const templates = columnsToRows(await grist.docApi.fetchTable(TABLE_TEMPLATES));

                state.projects = projects;
                state.contacts = contacts;
                state.templates = templates;

                document.getElementById('loadingMessage').style.display = 'none';
                document.getElementById('configSection').style.display = 'block';
                populateProjects();

            } catch (error) {
                document.getElementById('loadingMessage').style.display = 'none';
                const errorDiv = document.getElementById('errorMessage');
                errorDiv.className = 'error-box';
                errorDiv.innerHTML = '❌ ' + error.message;
                errorDiv.style.display = 'block';
            }
        }

        function populateProjects() {
            const select = document.getElementById('projectSelect');
            select.innerHTML = '<option value="">-- Choisir un projet --</option>';
            state.projects.forEach(p => {
                const opt = document.createElement('option');
                opt.value = p.id;
                opt.textContent = p.Projet;
                select.appendChild(opt);
            });
        }

        function populateTemplates(projectId) {
            const select = document.getElementById('templateSelect');
            const temps = state.templates.filter(t => t.Projet === projectId);
            select.innerHTML = '<option value="">-- Aucun template --</option>';
            temps.forEach(t => {
                const opt = document.createElement('option');
                opt.value = t.id;
                opt.textContent = t.Nom || 'Template ' + t.id;
                select.appendChild(opt);
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('projectSelect').addEventListener('change', (e) => {
                const projId = parseInt(e.target.value);
                if (!projId) {
                    state.currentProject = null;
                    document.getElementById('messageSection').style.display = 'none';
                    document.getElementById('contactsSection').style.display = 'none';
                    return;
                }
                
                state.currentProject = state.projects.find(p => p.id === projId);
                state.currentTemplateId = null;
                state.selectedContacts.clear();
                
                document.getElementById('messageText').value = '';
                document.getElementById('subjectText').value = '';
                document.getElementById('btnSave').style.display = 'none';
                document.getElementById('messageSection').style.display = 'block';
                
                populateTemplates(projId);
                displayContacts(projId);
            });

            document.getElementById('templateSelect').addEventListener('change', (e) => {
                const tempId = parseInt(e.target.value);
                if (!tempId) {
                    state.currentTemplateId = null;
                    document.getElementById('btnSave').style.display = 'none';
                    return;
                }
                
                const temp = state.templates.find(t => t.id === tempId);
                if (temp) {
                    state.currentTemplateId = tempId;
                    document.getElementById('messageText').value = temp.Contenu_HTML || '';
                    document.getElementById('subjectText').value = temp.Objet_Mail || '';
                    document.getElementById('btnSave').style.display = 'inline-block';
                    updatePreview();
                }
            });

            document.getElementById('messageText').addEventListener('input', updatePreview);
            document.getElementById('subjectText').addEventListener('input', updatePreview);

            initGrist();
        });

        function updatePreview() {
            const text = document.getElementById('messageText').value;
            const preview = document.getElementById('messagePreview');
            if (text.trim().startsWith('<')) {
                preview.innerHTML = text;
            } else {
                preview.innerHTML = '<p>' + text.replace(/\n/g, '<br>') + '</p>';
            }
        }

        function displayContacts(projId) {
            const contacts = state.contacts.filter(c => c.Projet === projId);
            const list = document.getElementById('contactsList');
            list.innerHTML = '';

            if (contacts.length === 0) {
                document.getElementById('contactsSection').style.display = 'none';
                return;
            }

            document.getElementById('contactsSection').style.display = 'block';
            document.getElementById('contactCount').textContent = contacts.length;

            contacts.forEach(c => {
                const card = document.createElement('div');
                card.className = 'contact-card' + (state.selectedContacts.has(c.id) ? ' selected' : '');
                card.id = 'card-' + c.id;

                const hab = c[COL_HABILITATION] || '';
                const chk = c[COL_HABILITE] === true;

                card.innerHTML = '<div style="flex: 1; display: flex; gap: 12px; align-items: center;">' +
                    '<input type="checkbox" id="sel-' + c.id + '" ' + (state.selectedContacts.has(c.id) ? 'checked' : '') + ' onchange="toggleSelect(' + c.id + ')">' +
                    '<div class="contact-info">' +
                    '<h3>' + (c.Prénom || '') + ' ' + (c.Nom || '') + '</h3>' +
                    '<p>📧 ' + (c.Mail || 'N/A') + '</p>' +
                    '<p>Habilitation accordée : ' + hab + '</p>' +
                    '</div></div>' +
                    '<div class="contact-actions">' +
                    '<input type="checkbox" id="hab-' + c.id + '" ' + (chk ? 'checked' : '') + ' onchange="toggleHab(' + c.id + ')" title="Habilité">' +
                    '<button class="button btn-small btn-primary" onclick="sendOne(' + c.id + ')">📧 Envoyer</button>' +
                    '</div>';
                list.appendChild(card);
            });
        }

        function toggleSelect(id) {
            if (state.selectedContacts.has(id)) {
                state.selectedContacts.delete(id);
                document.getElementById('card-' + id).classList.remove('selected');
            } else {
                state.selectedContacts.add(id);
                document.getElementById('card-' + id).classList.add('selected');
            }
            document.getElementById('selectedCount').textContent = state.selectedContacts.size;
            document.getElementById('bulkActionsSection').style.display = state.selectedContacts.size > 0 ? 'block' : 'none';
        }

        async function toggleHab(id) {
            const c = state.contacts.find(x => x.id === id);
            if (!c) return;
            const newVal = !c[COL_HABILITE];
            c[COL_HABILITE] = newVal;
            try {
                await grist.docApi.applyUserActions([['UpdateRecord', TABLE_CONTACTS, id, { [COL_HABILITE]: newVal }]]);
            } catch (e) { console.error(e); }
        }

        function sendOne(id) {
            const c = state.contacts.find(x => x.id === id);
            if (c) sendEmail(c.Mail);
        }

        function sendEmail(email) {
            const msg = document.getElementById('messageText').value;
            const subj = document.getElementById('subjectText').value;
            const link = 'mailto:' + email + '?subject=' + encodeURIComponent(subj) + '&body=' + encodeURIComponent(msg);
            window.open(link);
        }

        function sendGroupEmail() {
            const emails = [];
            state.selectedContacts.forEach(id => {
                const c = state.contacts.find(x => x.id === id);
                if (c && c.Mail) emails.push(c.Mail);
            });
            if (emails.length === 0) { alert('❌ Aucun email valide'); return; }
            const msg = document.getElementById('messageText').value;
            const subj = document.getElementById('subjectText').value;
            const link = 'mailto:' + emails.join(';') + '?subject=' + encodeURIComponent(subj) + '&body=' + encodeURIComponent(msg);
            window.open(link);
        }

        function previewAndSend() {
            const msg = document.getElementById('messageText').value;
            const subj = document.getElementById('subjectText').value;
            const win = window.open('', 'preview', 'width=800,height=600');
            const html = '<!DOCTYPE html><html><head><meta charset=UTF-8><title>' + subj + '</title><style>body{font-family:Arial;margin:20px;background:#f5f5f5}' +
                '.box{background:white;padding:30px;max-width:600px;margin:0 auto;border-radius:8px}.header{border-bottom:2px solid #000091;padding-bottom:15px;margin-bottom:20px}' +
                '.subject{color:#000091;font-weight:bold;font-size:18px}.content{line-height:1.6}' +
                '.actions{margin-top:20px;padding-top:20px;border-top:1px solid #ddd}button{padding:10px 20px;background:#4CAF50;color:white;border:none;border-radius:4px;cursor:pointer}</style>' +
                '</head><body><div class=box><div class=header><div class=subject>Objet : ' + subj + '</div></div>' +
                '<div class=content>' + msg + '</div><div class=actions><button onclick="window.print()">🖨️ Imprimer</button></div></div></body></html>';
            win.document.write(html);
        }

        function insertTag(tag, label) {
            const ta = document.getElementById('messageText');
            const start = ta.selectionStart;
            const end = ta.selectionEnd;
            const text = ta.value.substring(start, end) || label;
            const before = '<' + tag + '>';
            const after = '</' + tag + '>';
            ta.value = ta.value.substring(0, start) + before + text + after + ta.value.substring(end);
            ta.focus();
            updatePreview();
        }

        function insertHeading() {
            const ta = document.getElementById('messageText');
            const text = ta.value.substring(ta.selectionStart, ta.selectionEnd) || 'Titre';
            ta.value = ta.value.substring(0, ta.selectionStart) + '\n<h2>' + text + '</h2>\n' + ta.value.substring(ta.selectionEnd);
            ta.focus();
            updatePreview();
        }

        function insertLink() {
            const url = prompt('URL :', 'https://');
            if (!url) return;
            const ta = document.getElementById('messageText');
            const text = ta.value.substring(ta.selectionStart, ta.selectionEnd) || 'Lien';
            ta.value = ta.value.substring(0, ta.selectionStart) + '<a href="' + url + '">' + text + '</a>' + ta.value.substring(ta.selectionEnd);
            updatePreview();
        }

        function insertList() {
            const ta = document.getElementById('messageText');
            const list = '\n<ul>\n  <li>Élément 1</li>\n  <li>Élément 2</li>\n</ul>\n';
            ta.value = ta.value.substring(0, ta.selectionStart) + list + ta.value.substring(ta.selectionEnd);
            ta.focus();
            updatePreview();
        }

        function copyToClipboard() {
            const msg = document.getElementById('messageText').value;
            navigator.clipboard.writeText(msg).then(() => {
                const fb = document.getElementById('copyFeedback');
                fb.style.display = 'block';
                setTimeout(() => fb.style.display = 'none', 3000);
            });
        }

        async function saveMessage() {
            if (!state.currentTemplateId) { alert('❌ Aucun template'); return; }
            const msg = document.getElementById('messageText').value;
            const subj = document.getElementById('subjectText').value;
            if (!msg.trim()) { alert('❌ Message vide'); return; }
            try {
                await grist.docApi.applyUserActions([['UpdateRecord', TABLE_TEMPLATES, state.currentTemplateId, { Contenu_HTML: msg, Objet_Mail: subj }]]);
                alert('✅ Template mis à jour !');
            } catch (e) { alert('❌ Erreur : ' + e.message); }
        }

        async function saveMessageAs() {
            const msg = document.getElementById('messageText').value;
            const subj = document.getElementById('subjectText').value;
            if (!msg.trim()) { alert('❌ Message vide'); return; }
            if (!subj.trim()) { alert('❌ Nom vide'); return; }
            if (!state.currentProject) { alert('❌ Projet'); return; }
            try {
                await grist.docApi.applyUserActions([['AddRecord', TABLE_TEMPLATES, null, { Projet: state.currentProject.id, Nom: subj, Contenu_HTML: msg, Objet_Mail: subj }]]);
                alert('✅ Template créé !');
                const temps = columnsToRows(await grist.docApi.fetchTable(TABLE_TEMPLATES));
                state.templates = temps;
                populateTemplates(state.currentProject.id);
            } catch (e) { alert('❌ Erreur : ' + e.message); }
        }
    </script>
</body>
</html>
