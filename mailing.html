<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Widget Habilitation</title>
    <script src="https://docs.getgrist.com/embed/grist-plugin-api.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #F5F5F5;
            color: #3C3C3C;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            color: #000091;
            margin-bottom: 30px;
            font-size: 32px;
        }
        
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        
        .panel {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .panel h2 {
            color: #000091;
            font-size: 20px;
            margin-bottom: 20px;
            border-bottom: 2px solid #F5F5F5;
            padding-bottom: 10px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #000091;
            font-size: 14px;
        }
        
        select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #E5E5E5;
            border-radius: 4px;
            font-family: inherit;
            font-size: 14px;
        }
        
        select:focus, textarea:focus {
            outline: none;
            border-color: #0055CC;
            box-shadow: 0 0 0 3px rgba(0, 85, 204, 0.1);
        }
        
        textarea {
            resize: vertical;
            min-height: 200px;
            font-family: monospace;
            font-size: 12px;
        }
        
        .button {
            display: inline-block;
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }
        
        .btn-primary {
            background-color: #0055CC;
            color: white;
        }
        
        .btn-primary:hover {
            background-color: #0047AB;
        }
        
        .btn-small {
            padding: 8px 12px;
            font-size: 12px;
        }
        
        .contacts-list {
            margin-top: 20px;
        }
        
        .contact-card {
            background: #F5F5F5;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #0055CC;
        }
        
        .contact-info h3 {
            font-size: 16px;
            margin-bottom: 4px;
            color: #000091;
        }
        
        .contact-info p {
            font-size: 13px;
            color: #656565;
            margin: 2px 0;
        }
        
        .contact-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .checkbox-container input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        
        .checkbox-container label {
            margin: 0;
            font-weight: 400;
            cursor: pointer;
        }
        
        .preview-section {
            background: white;
            border: 1px solid #E5E5E5;
            border-radius: 4px;
            padding: 15px;
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .preview-section h3 {
            color: #000091;
            font-size: 14px;
            margin-bottom: 10px;
        }
        
        .preview-frame {
            border: 1px solid #E5E5E5;
            border-radius: 4px;
            padding: 15px;
            background: white;
            font-size: 12px;
        }
        
        .info-box {
            background-color: #E3F2FD;
            border-left: 4px solid #0055CC;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
            font-size: 13px;
        }
        
        .error-box {
            background-color: #FFEBEE;
            border-left: 4px solid #D32F2F;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
            font-size: 13px;
            color: #C62828;
        }
        
        .loading {
            text-align: center;
            padding: 40px 20px;
            color: #656565;
        }
        
        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Habilitation des Agents</h1>
        
        <div class="main-grid">
            <!-- Colonne gauche : Sélection projet + message -->
            <div class="panel">
                <h2>📋 Configuration du Projet</h2>
                
                <div id="loadingMessage" class="loading">
                    ⏳ Chargement des données Grist...
                </div>
                
                <div id="errorMessage" style="display: none;"></div>
                
                <div id="configSection" style="display: none;">
                    <div class="form-group">
                        <label for="projectSelect">Sélectionner un projet :</label>
                        <select id="projectSelect">
                            <option value="">-- Choisir un projet --</option>
                        </select>
                    </div>
                    
                    <div id="messageSection" style="display: none;">
                        <div class="form-group">
                            <label for="messageText">Message HTML à envoyer :</label>
                            <textarea id="messageText" placeholder="Message HTML..."></textarea>
                        </div>
                        
                        <button class="button btn-primary" onclick="saveMessage()">💾 Enregistrer le message</button>
                        
                        <div class="preview-section">
                            <h3>Aperçu du message :</h3>
                            <div class="preview-frame" id="messagePreview"></div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Colonne droite : Liste des contacts -->
            <div class="panel">
                <h2>👥 Agents à habiliter</h2>
                
                <div id="noProjectSelected" class="info-box">
                    Sélectionnez un projet pour voir les agents inscrit(e)s.
                </div>
                
                <div id="contactsSection" style="display: none;">
                    <div class="info-box">
                        <strong>Nombre d'agents :</strong> <span id="contactCount">0</span>
                    </div>
                    
                    <div class="contacts-list" id="contactsList"></div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let state = {
            projects: [],
            contacts: [],
            currentProject: null,
            gristReady: false
        };
        
        // Initialiser Grist
        async function initGrist() {
            console.log("Initialisation Grist...");
            
            try {
                // Appeler grist.ready
                await grist.ready({ requiredAccess: 'read table' });
                console.log("grist.ready() appelé avec succès");
                
                state.gristReady = true;
                
                // Essayer de récupérer les tables
                console.log("Tentative de récupération des tables via RPC...");
                
                // Utiliser rpc.getTable si disponible
                if (grist.rpc && grist.rpc.getTable) {
                    console.log("Utilisation de grist.rpc.getTable");
                    const projects = await grist.rpc.getTable('Projet-_Mailing-Projets');
                    const contacts = await grist.rpc.getTable('Projet-_Mailing-Contacts');
                    
                    console.log("Projets:", projects);
                    console.log("Contacts:", contacts);
                    
                    loadData(projects, contacts);
                } else {
                    console.warn("grist.rpc.getTable non disponible, essai alternatif...");
                    // Fallback: charger les données via une API externe ou demo
                    loadDemoData();
                }
                
            } catch (error) {
                console.error("Erreur Grist:", error);
                console.error("Stack:", error.stack);
                
                // Fallback sur démo
                showError("Erreur de connexion Grist: " + error.message + ". Chargement en mode démo...");
                setTimeout(() => loadDemoData(), 2000);
            }
        }
        
        // Charger les données
        function loadData(projectsArray, contactsArray) {
            console.log("Chargement des données...");
            
            state.projects = projectsArray || [];
            state.contacts = contactsArray || [];
            
            console.log("Projets chargés:", state.projects.length);
            console.log("Contacts chargés:", state.contacts.length);
            
            document.getElementById('loadingMessage').style.display = 'none';
            document.getElementById('configSection').style.display = 'block';
            
            populateProjectSelect();
        }
        
        // Charger les données de démo
        function loadDemoData() {
            console.log("Chargement des données de démo...");
            
            state.projects = [
                { id: 1, Projet: 'Projet A', Message_HTML: '<h1>Bienvenue au Projet A</h1><p>Ceci est un message de démo.</p>' },
                { id: 2, Projet: 'Projet B', Message_HTML: '<h1>Bienvenue au Projet B</h1><p>Ceci est un message de démo.</p>' }
            ];
            
            state.contacts = [
                { id: 1, Nom: 'MARTIN', Prénom: 'Jean', Mail: 'jean.martin@example.com', Projet: 'Projet A', Structure: 'Siège', Fonction: 'Chef', 'Habilitation accordée': 'En attente' },
                { id: 2, Nom: 'DUPONT', Prénom: 'Marie', Mail: 'marie.dupont@example.com', Projet: 'Projet A', Structure: 'Antenne', Fonction: 'Adjoint', 'Habilitation accordée': 'En attente' },
                { id: 3, Nom: 'DURAND', Prénom: 'Paul', Mail: 'paul.durand@example.com', Projet: 'Projet B', Structure: 'Siège', Fonction: 'Agent', 'Habilitation accordée': 'Niveau 1' }
            ];
            
            document.getElementById('loadingMessage').style.display = 'none';
            document.getElementById('configSection').style.display = 'block';
            
            populateProjectSelect();
        }
        
        // Afficher une erreur
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.className = 'error-box';
            errorDiv.innerHTML = '❌ ' + message;
            errorDiv.style.display = 'block';
        }
        
        // Remplir le dropdown des projets
        function populateProjectSelect() {
            const select = document.getElementById('projectSelect');
            select.innerHTML = '<option value="">-- Choisir un projet --</option>';
            
            state.projects.forEach(project => {
                const option = document.createElement('option');
                option.value = project.Projet || project.id;
                option.textContent = project.Projet || `Projet ${project.id}`;
                select.appendChild(option);
            });
        }
        
        // Changement de projet
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('projectSelect').addEventListener('change', function(e) {
                const projectName = e.target.value;
                
                if (!projectName) {
                    state.currentProject = null;
                    document.getElementById('messageSection').style.display = 'none';
                    document.getElementById('contactsSection').style.display = 'none';
                    document.getElementById('noProjectSelected').style.display = 'block';
                    return;
                }
                
                state.currentProject = state.projects.find(p => (p.Projet || p.id) === projectName);
                
                if (state.currentProject) {
                    document.getElementById('messageText').value = state.currentProject.Message_HTML || '';
                    updateMessagePreview();
                    document.getElementById('messageSection').style.display = 'block';
                    document.getElementById('noProjectSelected').style.display = 'none';
                    
                    displayContacts(projectName);
                }
            });
            
            // Gestion du préview
            document.getElementById('messageText').addEventListener('input', updateMessagePreview);
            
            // Initialiser
            initGrist();
        });
        
        // Mettre à jour l'aperçu du message
        function updateMessagePreview() {
            const messageText = document.getElementById('messageText').value;
            const preview = document.getElementById('messagePreview');
            
            if (messageText.trim().startsWith('<')) {
                preview.innerHTML = messageText;
            } else {
                preview.innerHTML = `<p>${messageText.replace(/\n/g, '<br>')}</p>`;
            }
        }
        
        // Afficher les contacts du projet sélectionné
        function displayContacts(projectName) {
            const projectContacts = state.contacts.filter(c => c.Projet === projectName);
            const contactsList = document.getElementById('contactsList');
            const contactCount = document.getElementById('contactCount');
            
            contactCount.textContent = projectContacts.length;
            contactsList.innerHTML = '';
            
            if (projectContacts.length === 0) {
                contactsList.innerHTML = '<p style="text-align: center; color: #656565;">Aucun agent inscrit pour ce projet.</p>';
                document.getElementById('contactsSection').style.display = 'none';
                return;
            }
            
            document.getElementById('contactsSection').style.display = 'block';
            
            projectContacts.forEach(contact => {
                const card = document.createElement('div');
                card.className = 'contact-card';
                
                const isHabilite = contact['Habilitation accordée'] && contact['Habilitation accordée'] !== 'En attente';
                
                card.innerHTML = `
                    <div class="contact-info">
                        <h3>${contact.Prénom || ''} ${contact.Nom || ''}</h3>
                        <p>📧 ${contact.Mail || 'N/A'}</p>
                        <p>🏢 ${contact.Structure || 'N/A'} - ${contact.Fonction || 'N/A'}</p>
                    </div>
                    <div class="contact-actions">
                        <div class="checkbox-container">
                            <input type="checkbox" id="check-${contact.id}" ${isHabilite ? 'checked' : ''} 
                                   onchange="toggleHabilite(${contact.id})">
                            <label for="check-${contact.id}">Habilité</label>
                        </div>
                        <button class="button btn-small btn-primary" onclick="sendEmail('${contact.Mail}', '${contact.Prénom}')">
                            📧 Envoyer
                        </button>
                    </div>
                `;
                contactsList.appendChild(card);
            });
        }
        
        // Envoyer un email
        function sendEmail(email, prenom) {
            const message = document.getElementById('messageText').value;
            
            const subject = encodeURIComponent('Habilitation Agent');
            const body = encodeURIComponent(message);
            const mailtoLink = `mailto:${email}?subject=${subject}&body=${body}`;
            
            window.open(mailtoLink);
        }
        
        // Enregistrer le message
        async function saveMessage() {
            const messageText = document.getElementById('messageText').value;
            
            if (!state.currentProject) return;
            
            state.currentProject.Message_HTML = messageText;
            
            if (state.gristReady && grist.rpc && grist.rpc.applyUserActions) {
                try {
                    await grist.rpc.applyUserActions([[
                        'UpdateRecord', 'Projet-_Mailing-Projets', state.currentProject.id, 
                        { 'Message_HTML': messageText }
                    ]]);
                    alert('✅ Message enregistré !');
                } catch (error) {
                    alert('❌ Erreur: ' + error.message);
                }
            } else {
                alert('✅ Message modifié (non sauvegardé - mode démo)');
            }
        }
        
        // Mettre à jour le statut
        function toggleHabilite(contactId) {
            const contact = state.contacts.find(c => c.id === contactId);
            if (contact) {
                const currentStatus = contact['Habilitation accordée'] || '';
                const newStatus = (currentStatus && currentStatus !== 'En attente') ? 'En attente' : 'Niveau 1';
                
                contact['Habilitation accordée'] = newStatus;
                
                if (state.gristReady && grist.rpc && grist.rpc.applyUserActions) {
                    try {
                        grist.rpc.applyUserActions([[
                            'UpdateRecord', 'Projet-_Mailing-Contacts', contactId,
                            { 'Habilitation accordée': newStatus }
                        ]]);
                        console.log("Statut mis à jour:", newStatus);
                    } catch (error) {
                        console.error("Erreur:", error);
                    }
                }
            }
        }
    </script>
</body>
</html>
